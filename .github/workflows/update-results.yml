name: Actualizar resultados (Mundial de las IAs)

# Trae los marcadores oficiales más recientes a results.json (grupos) y ko_results.json (eliminatorias)
# sin intervención manual.
# Fuente: openfootball/worldcup.json (dominio público, sin API key).

on:
  schedule:
    - cron: "*/30 * * * *"      # cada 30 minutos (UTC). Los resultados aparecen al terminar cada partido.
  workflow_dispatch:            # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write               # necesario para hacer commit de los resultados

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Actualizar results.json y ko_results.json desde el feed oficial
        run: python scripts/update_results.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name  "results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add results.json ko_results.json
          if git diff --cached --quiet; then
            echo "Sin cambios: nada que publicar."
          else
            git commit -m "Resultados: actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Resultados actualizados y publicados."
          fi
