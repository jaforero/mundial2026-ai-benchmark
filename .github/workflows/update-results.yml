name: Actualizar resultados (Mundial de las IAs)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Actualizar results.json desde el feed oficial
        run: python scripts/update_results.py

      - name: Commit y push si hubo cambios
        run: |
          if [[ -n "$(git status --porcelain results.json)" ]]; then
            git config user.name  "results-bot"
            git config user.email "actions@users.noreply.github.com"
            git add results.json
            git commit -m "Resultados: actualizacion automatica $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "Sin cambios: nada que publicar."
          fi
